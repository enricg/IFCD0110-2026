<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/geoJson.css" />
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./js/geoJson.js" defer></script>
  </head>

  <body>
    <nav class="navbar navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <button
          class="navbar-toggler d-lg-none"
          data-bs-toggle="offcanvas"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <a class="navbar-brand" href="#"> La meva web </a>
      </div>
    </nav>

    <!-- Menú lateral PC -->

    <div class="sidebar d-none d-lg-block">
      <div class="list-group list-group-flush">
        <a href="#inici" class="list-group-item">Inici</a>

        <a href="#serveis" class="list-group-item">Serveis</a>

        <a href="#projectes" class="list-group-item">Projectes</a>

        <a href="#contacte" class="list-group-item">Contacte</a>
      </div>
    </div>

    <!-- Menú mòbil -->

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menu">
      <div class="offcanvas-header">
        <h5>Menú</h5>

        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <div class="list-group">
          <a class="list-group-item" href="#inici" data-bs-dismiss="offcanvas">
            Inici
          </a>

          <a
            class="list-group-item"
            href="#serveis"
            data-bs-dismiss="offcanvas"
          >
            Serveis
          </a>

          <a
            class="list-group-item"
            href="#projectes"
            data-bs-dismiss="offcanvas"
          >
            Projectes
          </a>

          <a
            class="list-group-item"
            href="#contacte"
            data-bs-dismiss="offcanvas"
          >
            Contacte
          </a>
        </div>
      </div>
    </div>

    <main>
      <section id="inici" class="bg-light">
        <h2>Inici</h2>
        <label for="ciutat">Ciutat</label>
        <input type="text" name="mapa" id="tCiutat" />
        <div id="map"></div>
      </section>

      <section id="serveis" class="bg-secondary text-white">
        <h2>Serveis</h2>
      </section>

      <section id="projectes" class="bg-warning">
        <h2>Projectes</h2>
      </section>

      <section id="contacte" class="bg-info">
        <h2>Contacte</h2>
      </section>
    </main>

    <footer class="bg-dark text-white text-center p-4">Peu de pàgina</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
