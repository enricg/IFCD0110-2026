<!DOCTYPE html>
<html lang="ca">
    <head>
        <title>grid templates</title>
        <meta charset="utf-8"/>
        <style>
            .part{
                text-align: center;
                font-weight: bold;
                font-size: larger;
                float: left;
            }
            .capçalera{
                background-color: gray;
                height: 100px;
                float:none;
            }
            .menu{
                background-color: orange;
                height: 200px;
                width: 20%;
            }
            .principal{
                background-color: red;
                height: 200px;
                width: 60%;
            }
            .aside{
                background-color: green;
                height: 200px;
                width: 20%;
            }
            .peu{
                background-color: blue;
                height: 200px;
                width: 100%;
            }
        </style>
    </head>
    <body>
        <header>Exercici de distribució de contingut utilitzant grid-template</header>
        <hr>
        <main>
            <div class="part capçalera">Capçalera<br>(Utilitzant grid-template)</div>
            <div class="part menu">Menú</div>
            <div class="part principal">Principal</div>
            <div class="part aside">Aside</div>
            <div class="part peu">Peu</div>
        </main>
    </body>
</html>
