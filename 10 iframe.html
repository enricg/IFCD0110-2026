<!doctype html>
<html>
  <head>
    <title>ús de iframes</title>
    <meta charset="utf-8" />
    <style>
      header,
      footer {
        text-align: center;
        background-color: black;
        color: white;
        height: 50px;
        margin: 10px;
      }
      iframe {
        width: "100%";
        height: 350px;
      }
      .contenedor {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
      }
      .exemple {
        width: 300px;
        height: 500px;
        border: 1px solid #000000;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <header>Pràctica per incloure iframes</header>
    <main>
      <div class="contenedor">
        <div class="exemple">
          <h1>El meu primer exemple de iFrame</h1>
          <iframe
            src="./09 marcs.html"
            frameborder="0"
            title="El meu primer iframe"
          ></iframe>
        </div>
        <div class="exemple">
          <h1>Encastar una pàgina web</h1>
          <iframe
            src="https://www.cetpenedes.cat"
            frameborder="0"
            title="El meu primer iframe"
          ></iframe>
        </div>
        <div class="exemple">
          <h1>Inserció del mapa</h1>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2995.4824618776843!2d1.7004164765701786!3d41.3418659988167!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12a4798ee28317e3%3A0x80149c66fa1200fb!2sCentre%20Ensenyaments%20T%C3%A8cnics%20Pened%C3%A8s!5e0!3m2!1ses!2ses!4v1776160474139!5m2!1ses!2ses"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
        <div class="exemple">
          <h1>Conversor de divises</h1>
          <iframe
            style="border: none"
            src="https://themoneyconverter.com/CurrencyConverter?tab=0&from=USD&to=EUR&bg=ffffff"
            marginwidth="0"
            marginheight="0"
            scrolling="no"
            seamless="seamless"
          ></iframe>
        </div>
        <div class="exemple">
          <h1>Inserció de video de YT</h1>
          <iframe
            src="https://www.youtube.com/embed/hzR0NK32yQs"
            title="Vídeo presentación Club de Rugby Cervelló"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
        <div class="exemple">
          <h1>Inserció de vídeo d'Odisee</h1>
          <iframe
            src="https://player.odycdn.com/v6/streams/58cb653549b4977f35ca0db114d2b2ed231c1f4e/142147.mp4"
          ></iframe>
        </div>
      </div>
    </main>
    <footer>Desenvolupat per Enric</footer>
  </body>
</html>
