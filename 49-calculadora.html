<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora amb Grid</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/49 calculadora.css" />
    <script src="./js/49 calculadora.js" defer></script>
  </head>
  <body>
    <div class="contenidor">
      <!-- CAPÇALERA -->
      <header class="bg-dark text-white text-center py-4">
        <h1>Calculadora Web</h1>
      </header>

      <!-- MAIN -->
      <main class="d-flex justify-content-center align-items-center">
        <div class="calculadora shadow">
          <input
            type="text"
            class="pantalla form-control mb-3"
            id="display"
            readonly
          />

          <div class="tecles">
            <button class="btn btn-secondary" id="btnC" onclick="netejar('C')">
              C
            </button>
            <!-- <button
              class="btn btn-secondary"
              id="btnCE"
              onclick="netejar('CE')"
            >
              CE 
            </button> -->
            <button class="btn btn-secondary" id="btn1C" onclick="netejar('<')">
              <
            </button>
            <button class="btn btn-secondary"></button>
            <button class="btn btn-secondary"></button>
            <button
              class="btn btn-secondary"
              id="btnOff"
              onclick="netejar('OFF<')"
            >
              Off
            </button>
            <button
              class="btn btn-secondary"
              id="btnMM"
              onclick="canviaSigne('±')"
            >
              ±
            </button>
            <button class="btn btn-secondary" onclick="afegir('%')">%</button>
            <button class="btn btn-warning" onclick="afegir('÷')">÷</button>

            <button class="btn btn-light" onclick="afegir('7')">7</button>
            <button class="btn btn-light" onclick="afegir('8')">8</button>
            <button class="btn btn-light" onclick="afegir('9')">9</button>
            <button class="btn btn-warning" onclick="afegir('*')">×</button>

            <button class="btn btn-light" onclick="afegir('4')">4</button>
            <button class="btn btn-light" onclick="afegir('5')">5</button>
            <button class="btn btn-light" onclick="afegir('6')">6</button>
            <button class="btn btn-warning" onclick="afegir('-')">−</button>

            <button class="btn btn-light" onclick="afegir('1')">1</button>
            <button class="btn btn-light" onclick="afegir('2')">2</button>
            <button class="btn btn-light" onclick="afegir('3')">3</button>
            <button class="btn btn-warning" onclick="afegir('+')">+</button>

            <button class="btn btn-light zero" onclick="afegir('0')">0</button>
            <button class="btn btn-light" onclick="afegir('.')">,</button>
            <button class="btn btn-success" onclick="calcular()">=</button>
          </div>
        </div>
      </main>

      <!-- PEU DE PÀGINA -->
      <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 Calculadora Bootstrap</p>
      </footer>
    </div>
  </body>
</html>
