<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora amb Grid</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/49 calculadora.css">
    <script src="./js/49 calculadora.js" defer></script>
</head>
<body>

    <div class="contenidor">

        <!-- CAPÇALERA -->
        <header class="bg-primary text-white text-center py-4">
            <h1>Calculadora Web</h1>
        </header>

        <!-- MAIN -->
        <main class="d-flex justify-content-center align-items-center">
            <div class="calculadora shadow">

                <input type="text" class="pantalla form-control mb-3" id="resultat" readonly>

                <div class="tecles">
                    <button class="btn btn-secondary" id="btnC" onclick="afegirCaracter('C')">C</button>
                    <button class="btn btn-secondary" id="btnMM" onclick="afegirCaracter('±')">±</button>
                    <button class="btn btn-secondary" onclick="afegirCaracter('%')">%</button>
                    <button class="btn btn-warning" onclick="afegirCaracter('÷')">÷</button>

                    <button class="btn btn-light" onclick="afegirCaracter('7')">7</button>
                    <button class="btn btn-light" onclick="afegirCaracter('8')">8</button>
                    <button class="btn btn-light" onclick="afegirCaracter('9')">9</button>
                    <button class="btn btn-warning" onclick="afegirCaracter('*')">×</button>

                    <button class="btn btn-light" onclick="afegirCaracter('4')">4</button>
                    <button class="btn btn-light" onclick="afegirCaracter('5')">5</button>
                    <button class="btn btn-light" onclick="afegirCaracter('6')">6</button>
                    <button class="btn btn-warning" onclick="afegirCaracter('-')">−</button>

                    <button class="btn btn-light" onclick="afegirCaracter('1')">1</button>
                    <button class="btn btn-light" onclick="afegirCaracter('2')">2</button>
                    <button class="btn btn-light" onclick="afegirCaracter('3')">3</button>
                    <button class="btn btn-warning" onclick="afegirCaracter('+')">+</button>

                    <button class="btn btn-light zero" onclick="afegirCaracter('0')">0</button>
                    <button class="btn btn-light" onclick="afegirCaracter('.')">,</button>
                    <button class="btn btn-success" onclick="calcular()">=</button>
                </div>

            </div>
        </main>

        <!-- PEU DE PÀGINA -->
        <footer class="bg-dark text-white text-center py-3">
            <p class="mb-0">&copy; 2026 Calculadora Bootstrap</p>
        </footer>

    </div>

</body>
</html>
