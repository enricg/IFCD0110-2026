<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joc del tres en ratlla</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/53 Tic Tac Toe.css" />
    <script src="./js/53 Tic Tac Toe.js" defer></script>
  </head>
  <body>
    <div class="contenidor">
      <!-- CAPÇALERA -->
      <header class="bg-dark text-white text-center py-4">
        <h1>Joc del tres en ratlla</h1>
      </header>

      <!-- MAIN -->
      <main class="d-flex justify-content-center align-items-center">
        <div class="tauler">
          <div class="casella" id="p00" onclick="tirada('00')"></div>
          <div class="casella" id="p01" onclick="tirada('01')"></div>
          <div class="casella" id="p02" onclick="tirada('02')"></div>
          <div class="casella" id="p10" onclick="tirada('10')"></div>
          <div class="casella" id="p11" onclick="tirada('11')"></div>
          <div class="casella" id="p12" onclick="tirada('12')"></div>
          <div class="casella" id="p20" onclick="tirada('20')"></div>
          <div class="casella" id="p21" onclick="tirada('21')"></div>
          <div class="casella" id="p22" onclick="tirada('22')"></div>
        </div>
      </main>

      <!-- PEU DE PÀGINA -->
      <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 Calculadora Bootstrap</p>
      </footer>
    </div>
  </body>
</html>
