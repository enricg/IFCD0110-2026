<!DOCTYPE html>
<html>
    <head>
        <title>marquee</title>
        <meta charset="utf-8"/>
        <link rel="shortcut icon" href="./imgs/ico.png" type="image/x-icon">
        <style>
            header, footer{
                text-align: center;
                background-color: black;
                color: white;
            }
        </style>
    </head>
    <body>
        <header>Us de marquesines</header>
        <main>
            <marquee width="80%" height="500px" 
            scrollamount=10 direction="up">Marquesina anant cap amunt</marquee>
            <marquee width="60%" direction="down" height="500px">
Aquest és un exemple de text de desplaçament que té textos de desplaçament cap avall.
</marquee>
<marquee width="60%" direction="right" height="100px">
Aquest és un exemple de text de desplaçament que té textos de desplaçament cap a la dreta.
</marquee>
        </main>
        <footer>Fet per Enric</footer>
    </body>
</html>
