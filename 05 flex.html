<!DOCTYPE html>
<html lang="ca">
    <head>
        <title>Exemple de display Flex</title>
        <meta charset="utf-8"/>
        <style>
            header, footer{
                text-align: center;
                background-color: black;
                color: white;
            }
            header{margin-bottom: 10px;}
            main{
                height: 500px;
                display: flex;
                /* flex-direction: column-reverse; */
                /* flex-wrap: wrap-reverse; */
                justify-content: space-between;
                /* align-items: center; */
                
            }
            .caixa{
                height:150px;
                width: 150px;
            }
            .vermell{background-color: red;}
            .verd{background-color: green;}
            .groc{background-color: yellow;}
            .taronja{background-color: orange;}
        </style>
    </head>
    <body>
        <header>Exemple de display Flex</header>
        <main>
            <div class="caixa vermell">Caixa1</div>
            <div class="caixa" style="background-color: green;order: 2;">Caixa2</div>
            <div class="caixa groc">Caixa3</div>
            <div class="caixa taronja">Caixa4</div>
        </main>
        <footer>Desenvolupat per Enric</footer>

    </body>
